name: Manufacturing Operations Intelligence Automation Pipeline

on:

  push:
    branches:
      - main

  schedule:
    # Runs every day at 6:00 AM Eastern Time (10:00 UTC)
    - cron: "0 10 * * *"


jobs:

  run-r-pipeline:

    runs-on: ubuntu-latest


    steps:

      - name: Checkout Repository
        uses: actions/checkout@v5


      - name: Setup R
        uses: r-lib/actions/setup-r@v2


      - name: Install R Packages
        run: |
          Rscript -e "install.packages(c(
            'tidyverse',
            'ggplot2',
            'dplyr',
            'readr',
            'rmarkdown',
            'knitr',
            'blastula',
            'shiny',
            'plotly',
            'DT'
          ))"


      - name: Run Manufacturing Automation Pipeline
        run: |
          Rscript main.R
